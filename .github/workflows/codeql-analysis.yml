name: CodeQL
'on':
  push:
    branches:
    - master
  merge_group:
    branches:
    - master
  pull_request:
    branches:
    - master
  schedule:
  - cron: 18 21 * * 5
jobs:
  analyze:
    name: Analyze
    if: github.repository == 'OffchainLabs/nitro'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      WABT_VERSION: 1.0.32
    strategy:
      fail-fast: false
      matrix:
        language:
        - go
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true
    - name: Install dependencies
      run: sudo apt update && sudo apt install -y wabt
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}
        config-file: ./.github/codeql/codeql-config.yml
    - name: Setup nodejs
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: yarn
        cache-dependency-path: '**/yarn.lock'
    - name: Install go
      uses: actions/setup-go@v4
      with:
        go-version: 1.23.x
    - name: Install rust stable
      uses: dtolnay/rust-toolchain@stable
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
    - name: Cache Rust Build Products
      uses: actions/cache@v3
      with:
        path: '~/.cargo/registry/

          ~/.cargo/git/

          arbitrator/target/

          arbitrator/wasm-libraries/target/

          arbitrator/wasm-libraries/soft-float/SoftFloat/build

          target/etc/initial-machine-cache/

          '
        key: ${{ runner.os }}-cargo-${{ steps.install-rust.outputs.rustc_hash }}-min-${{
          hashFiles('arbitrator/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-${{ steps.install-rust.outputs.rustc_hash
          }}-
    - name: Cache wabt build
      id: cache-wabt
      uses: actions/cache@v3
      with:
        path: ~/wabt-prefix
        key: ${{ runner.os }}-wabt-codeql-${{ env.WABT_VERSION }}
    - name: Cache cbrotli
      uses: actions/cache@v3
      id: cache-cbrotli
      with:
        path: 'target/include/brotli/

          target/lib-wasm/

          target/lib/libbrotlicommon-static.a

          target/lib/libbrotlienc-static.a

          target/lib/libbrotlidec-static.a

          '
        key: ${{ runner.os }}-brotli-3a-${{ hashFiles('scripts/build-brotli.sh') }}-${{
          hashFiles('.github/workflows/arbitrator-ci.yaml') }}
        restore-keys: ${{ runner.os }}-brotli-
    - name: Build cbrotli-local
      if: steps.cache-cbrotli.outputs.cache-hit != 'true'
      run: ./scripts/build-brotli.sh -l
    - name: Cache Build Products
      uses: actions/cache@v3
      with:
        path: '~/go/pkg/mod

          ~/.cache/go-build

          '
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: ${{ runner.os }}-go-
    - name: Build all lint dependencies
      run: make -j build-node-deps
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
